version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: magicalholidays-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: magical
      POSTGRES_PASSWORD: holidays123
      POSTGRES_DB: magicalholidays
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magical -d magicalholidays"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
